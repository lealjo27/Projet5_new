name: Sync to Hugging Face
on:
  push:
    branches: [main] # Se déclenche sur ces deux branches

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://lealjo27:$HF_TOKEN@huggingface.co/spaces/lealjo27/projet5-attrition-api creationapi:main